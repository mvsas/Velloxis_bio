<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velloxis | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    
  </style>
</head>
<body>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <div class="wrapper">

    <!-- Logo -->
    <div class="logo-wrap">
      <img class="logo-img" src="img/velloxis_semfundo.png" alt="Velloxis Logo" />
    </div>

    <p class="tagline">Agência de  Processos automaticos &amp; Design web</p>

    <div class="divider"></div>

    <!-- Links -->
    <div class="links">

      <!-- CTA Principal: Orçamento -->
      <a href="https://wa.me/SEUNUMERO?text=Ol%C3%A1!%20Quero%20solicitar%20um%20or%C3%A7amento." class="btn primary" target="_blank" rel="noopener">
        <div class="icon icon-orcamento">💼</div>
        <div class="btn-text">
          <span class="btn-label">Comece agora</span>
          <span class="btn-title">Solicitar Orçamento</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <!-- WhatsApp -->
      <a href="https://wa.me/SEUNUMERO" class="btn" target="_blank" rel="noopener">
        <div class="icon icon-wa">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M20.52 3.48A11.77 11.77 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.11.55 4.16 1.6 5.97L0 24l6.22-1.58A11.93 11.93 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.2-1.25-6.21-3.48-8.52ZM12 21.94a9.9 9.9 0 0 1-5.04-1.37l-.36-.21-3.69.94.97-3.6-.24-.38A9.89 9.89 0 0 1 2.07 12C2.07 6.52 6.52 2.07 12 2.07c2.65 0 5.14 1.03 7.01 2.9A9.87 9.87 0 0 1 21.93 12c0 5.47-4.46 9.94-9.93 9.94Zm5.44-7.44c-.3-.15-1.76-.87-2.03-.97-.28-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.76-1.66-2.06-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.14-.17.19-.3.29-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.61-.92-2.2-.24-.58-.49-.5-.67-.51H6.6c-.2 0-.52.07-.79.37-.27.3-1.03 1.01-1.03 2.46s1.06 2.85 1.2 3.05c.15.2 2.08 3.18 5.04 4.46.7.3 1.25.48 1.68.62.7.22 1.34.19 1.84.12.56-.08 1.76-.72 2.01-1.41.25-.7.25-1.3.17-1.42-.07-.12-.27-.19-.57-.34Z" fill="#25D166"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Fale conosco</span>
          <span class="btn-title">WhatsApp</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <!-- Site -->
      <a href="https://velloxis.com.br" class="btn" target="_blank" rel="noopener">
        <div class="icon icon-site">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(154,92,246,1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Conheça nosso trabalho</span>
          <span class="btn-title">Nosso Site</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <!-- Instagram -->
      <a href="https://instagram.com/velloxis" class="btn" target="_blank" rel="noopener">
        <div class="icon icon-ig">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <defs>
              <linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f09433"/>
                <stop offset="25%" stop-color="#e6683c"/>
                <stop offset="50%" stop-color="#dc2743"/>
                <stop offset="75%" stop-color="#cc2366"/>
                <stop offset="100%" stop-color="#bc1888"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="url(#ig)" stroke-width="2" fill="none"/>
            <circle cx="12" cy="12" r="4" stroke="url(#ig)" stroke-width="2" fill="none"/>
            <circle cx="17.5" cy="6.5" r="1" fill="url(#ig)"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Nos siga</span>
          <span class="btn-title">Instagram</span>
        </div>
        <span class="arrow">→</span>
      </a>

      <!-- Email -->
      <a href="mailto:contato@velloxis.com.br" class="btn" target="_blank" rel="noopener">
        <div class="icon icon-mail">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Envie uma mensagem</span>
          <span class="btn-title">E-mail</span>
        </div>
        <span class="arrow">→</span>
      </a>

    </div>

    <p class="footer">© 2026 Velloxis · Todos os direitos reservados</p>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'p';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = p.style.height = (Math.random() * 3 + 1.5) + 'px';
      p.style.animationDuration = (Math.random() * 12 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.opacity = Math.random() * 0.5;
      container.appendChild(p);
    }
  </script>
</body>
</html>
